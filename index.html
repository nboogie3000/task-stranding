<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TASK STRANDING — Death Stranding-inspired in-game order management overlay">
  <meta name="theme-color" content="#0a0c0f">

  <!-- Security headers (also set in GitHub Pages _headers or server config) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

  <title>TASK TERMINAL — Order Management</title>
  <link rel="stylesheet" href="styles.css">

  <!-- Preconnect for font performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>

  <!-- ── Main App Wrapper ───────────────────────────────────── -->
  <div id="app">

    <!-- Atmospheric effects -->
    <div class="scan-line" aria-hidden="true"></div>
    <div class="scan-line-2" aria-hidden="true"></div>
    <div class="corner tl" aria-hidden="true"></div>
    <div class="corner tr" aria-hidden="true"></div>
    <div class="corner bl" aria-hidden="true"></div>
    <div class="corner br" aria-hidden="true"></div>

    <!-- ── Header ──────────────────────────────────────────── -->
    <header class="header">
      <div class="header-left">
        <div class="logo-mark" aria-hidden="true">
          <div class="logo-inner"></div>
        </div>
        <div class="title-group">
          <div class="title-main">Order Management</div>
          <div class="title-sub">TASK TERMINAL v1.0 // ACTIVE SESSION</div>
        </div>
      </div>
      <div class="header-right">
        <div class="stat-pill">ACTIVE <span id="active-count">0</span></div>
        <div class="stat-pill">DONE <span id="done-count">0</span></div>
        <button class="add-btn" onclick="openModal(null)" aria-label="Create new order">+ New Order</button>
      </div>
    </header>

    <!-- ── View Tabs ────────────────────────────────────────── -->
    <nav class="tab-bar" role="tablist" aria-label="Order views">
      <button class="tab active" role="tab" aria-selected="true" onclick="setTab('all',this)">All Orders</button>
      <button class="tab" role="tab" aria-selected="false" onclick="setTab('high',this)">Priority</button>
      <button class="tab" role="tab" aria-selected="false" onclick="setTab('active',this)">Active</button>
      <button class="tab" role="tab" aria-selected="false" onclick="setTab('done',this)">Completed</button>
    </nav>

    <!-- ── Game Filter Bar ──────────────────────────────────── -->
    <div class="filter-bar" id="filter-bar" role="toolbar" aria-label="Filter by game"></div>

    <!-- ── Task List ────────────────────────────────────────── -->
    <main class="body" id="task-list" role="list" aria-label="Orders"></main>

    <!-- ── Footer ───────────────────────────────────────────── -->
    <footer class="footer">
      <div class="footer-left" id="footer-text">STANDING BY</div>
      <div class="progress-bar-wrap" aria-label="Completion progress">
        <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-fill" id="prog-fill" style="width:0%"></div>
        </div>
        <div class="progress-label" id="prog-label">0%</div>
      </div>
    </footer>

  </div><!-- /#app -->

  <!-- ── HUD Mode Toggle (always visible) ─────────────────── -->
  <button id="hud-toggle" onclick="toggleHud()" title="Toggle HUD mode (Ctrl+H)">[ hud mode ]</button>

  <!-- ── Task Modal ───────────────────────────────────────── -->
  <div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-title" id="modal-title">// Register New Order</div>

      <div class="field">
        <label for="f-name">Order Name</label>
        <input type="text" id="f-name" placeholder="e.g. Gather ceramics x200" autocomplete="off">
      </div>
      <div class="field">
        <label for="f-game">Game</label>
        <select id="f-game"></select>
      </div>
      <div class="field">
        <label for="f-pri">Priority Level</label>
        <select id="f-pri">
          <option value="high">High — Critical path</option>
          <option value="med" selected>Med — Should do soon</option>
          <option value="low">Low — When possible</option>
        </select>
      </div>
      <div class="field">
        <label for="f-cat">Category</label>
        <select id="f-cat">
          <option>Resources</option>
          <option>Side mission</option>
          <option>Exploration</option>
          <option>Upgrade/Items/Weapons</option>
          <option>Story</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label for="f-notes">Notes</label>
        <textarea id="f-notes" placeholder="e.g. Need for zipline network upgrade..."></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-confirm" id="modal-confirm-btn" onclick="submitTask()">Confirm Order</button>
      </div>
    </div>
  </div>

  <!-- ── Add Game Modal ──────────────────────────────────────── -->
  <div class="modal-overlay" id="game-modal" role="dialog" aria-modal="true" aria-label="Add new game">
    <div class="modal">
      <div class="modal-title">// Add New Game</div>
      <div class="field">
        <label for="g-name">Game Name</label>
        <input type="text" id="g-name" placeholder="e.g. Hollow Knight" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeGameModal()">Cancel</button>
        <button class="btn-confirm" onclick="confirmAddGame()">Add Game</button>
      </div>
    </div>
  </div>

  <!-- ── Confirm / Danger Dialog ─────────────────────────────── -->
  <div class="confirm-overlay" id="confirm-overlay" role="dialog" aria-modal="true" aria-label="Confirm action">
    <div class="confirm-box">
      <div class="confirm-title">// Confirm Action</div>
      <div class="confirm-msg" id="confirm-msg"></div>
      <div class="confirm-actions">
        <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
        <button class="btn-danger" id="confirm-yes-btn">Confirm</button>
      </div>
    </div>
  </div>

  <script src="terminal.js"></script>
</body>

</html>
